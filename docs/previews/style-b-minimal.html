<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>棋谱回顾 - 风格B 极简现代</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        header {
            margin-bottom: 4rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid #e5e5e5;
        }

        .tag {
            display: inline-block;
            background: #1a1a1a;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 2px;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #666;
            font-size: 1rem;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: #e5e5e5;
            border-radius: 8px;
            overflow: hidden;
            margin: 3rem 0;
        }

        .summary-item {
            background: white;
            padding: 1.5rem;
            text-align: center;
        }

        .summary-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .summary-label {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .win { color: #22c55e; }
        .draw { color: #f59e0b; }
        .loss { color: #ef4444; }

        .games h2 {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #666;
            margin-bottom: 1.5rem;
        }

        .game-row {
            display: flex;
            align-items: center;
            padding: 1.25rem 0;
            border-bottom: 1px solid #e5e5e5;
            transition: all 0.2s;
        }

        .game-row:last-child { border-bottom: none; }
        .game-row:hover { padding-left: 0.5rem; }

        .result-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 1.5rem;
        }

        .result-dot.win { background: #22c55e; }
        .result-dot.draw { background: #f59e0b; }
        .result-dot.loss { background: #ef4444; }

        .game-content {
            flex: 1;
        }

        .game-opponent {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .game-meta {
            font-size: 0.875rem;
            color: #666;
        }

        .game-link {
            color: #1a1a1a;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .game-link:hover { text-decoration: underline; }

        footer {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid #e5e5e5;
            text-align: center;
            color: #999;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="tag">Chess Review</div>
            <h1>棋谱回顾</h1>
            <p class="subtitle">aaronwang2026 国际象棋对局记录</p>
        </header>

        <div class="summary">
            <div class="summary-item">
                <div class="summary-value">4</div>
                <div class="summary-label">总对局</div>
            </div>
            <div class="summary-item">
                <div class="summary-value win">1</div>
                <div class="summary-label">胜</div>
            </div>
            <div class="summary-item">
                <div class="summary-value draw">1</div>
                <div class="summary-label">和</div>
            </div>
            <div class="summary-item">
                <div class="summary-value loss">2</div>
                <div class="summary-label">败</div>
            </div>
        </div>

        <section class="games">
            <h2>对局记录</h2>

            <div class="game-row">
                <div class="result-dot win"></div>
                <div class="game-content">
                    <div class="game-opponent">vs Clement924810</div>
                    <div class="game-meta">执白 · 2026-04-14 · 19步</div>
                </div>
                <a href="#" class="game-link">查看 →</a>
            </div>

            <div class="game-row">
                <div class="result-dot draw"></div>
                <div class="game-content">
                    <div class="game-opponent">vs kote-karter</div>
                    <div class="game-meta">执黑 · 2026-04-13 · 59步</div>
                </div>
                <a href="#" class="game-link">查看 →</a>
            </div>

            <div class="game-row">
                <div class="result-dot loss"></div>
                <div class="game-content">
                    <div class="game-opponent">vs babbabar</div>
                    <div class="game-meta">执白 · 2026-04-11</div>
                </div>
                <a href="#" class="game-link">查看 →</a>
            </div>

            <div class="game-row">
                <div class="result-dot loss"></div>
                <div class="game-content">
                    <div class="game-opponent">vs digitaltheo</div>
                    <div class="game-meta">执白 · 2026-04-03</div>
                </div>
                <a href="#" class="game-link">查看 →</a>
            </div>
        </section>

        <footer>
            <p>自动生成于 2026-04-14</p>
        </footer>
    </div>
</body>
</html>
