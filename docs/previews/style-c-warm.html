<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>棋谱回顾 - 风格C 温暖手账</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Serif SC', serif;
            background: #fdf6e9;
            color: #3d3d3d;
            line-height: 1.8;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2rem;
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .chess-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 2.5rem;
            color: #2d2d2d;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #888;
            font-size: 0.95rem;
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 2rem 0;
        }

        .stat-box {
            text-align: center;
            padding: 1rem 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .stat-number {
            font-size: 1.75rem;
            font-weight: 700;
        }

        .stat-number.win { color: #c94043; }
        .stat-number.draw { color: #d4a012; }
        .stat-number.loss { color: #5a7d9a; }

        .stat-text {
            font-size: 0.8rem;
            color: #888;
        }

        .games-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.5rem;
            text-align: center;
            margin: 3rem 0 1.5rem;
            color: #3d3d3d;
        }

        .game-card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem 2rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 1.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        .result-badge {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            min-width: 60px;
            text-align: center;
        }

        .result-badge.win {
            background: #fde8e8;
            color: #c94043;
        }

        .result-badge.draw {
            background: #fef3d0;
            color: #d4a012;
        }

        .result-badge.loss {
            background: #e8f0f5;
            color: #5a7d9a;
        }

        .game-info {
            flex: 1;
        }

        .game-opponent {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .game-details {
            font-size: 0.85rem;
            color: #888;
        }

        .game-details span {
            margin-right: 1rem;
        }

        .detail-tag {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            background: #f5f0e8;
            border-radius: 4px;
            margin-right: 0.5rem;
            font-size: 0.8rem;
        }

        .view-btn {
            color: #c94043;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            padding: 0.5rem 1rem;
            border: 1px solid #c94043;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .view-btn:hover {
            background: #c94043;
            color: white;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px dashed #ddd;
            color: #aaa;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="chess-icon">♟️</div>
            <h1>棋谱回顾</h1>
            <p class="subtitle">aaronwang2026 的对局记录</p>

            <div class="stats-row">
                <div class="stat-box">
                    <div class="stat-number win">1</div>
                    <div class="stat-text">胜</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number draw">1</div>
                    <div class="stat-text">和</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number loss">2</div>
                    <div class="stat-text">败</div>
                </div>
            </div>
        </header>

        <h2 class="games-title">— 近期对局 —</h2>

        <div class="game-card">
            <div class="result-badge win">胜</div>
            <div class="game-info">
                <div class="game-opponent">vs Clement924810</div>
                <div class="game-details">
                    <span class="detail-tag">白方</span>
                    <span>2026-04-14</span>
                    <span>19步</span>
                </div>
            </div>
            <a href="#" class="view-btn">查看</a>
        </div>

        <div class="game-card">
            <div class="result-badge draw">和</div>
            <div class="game-info">
                <div class="game-opponent">vs kote-karter</div>
                <div class="game-details">
                    <span class="detail-tag">黑方</span>
                    <span>2026-04-13</span>
                    <span>59步</span>
                </div>
            </div>
            <a href="#" class="view-btn">查看</a>
        </div>

        <div class="game-card">
            <div class="result-badge loss">负</div>
            <div class="game-info">
                <div class="game-opponent">vs babbabar</div>
                <div class="game-details">
                    <span class="detail-tag">白方</span>
                    <span>2026-04-11</span>
                </div>
            </div>
            <a href="#" class="view-btn">查看</a>
        </div>

        <div class="game-card">
            <div class="result-badge loss">负</div>
            <div class="game-info">
                <div class="game-opponent">vs digitaltheo</div>
                <div class="game-details">
                    <span class="detail-tag">白方</span>
                    <span>2026-04-03</span>
                </div>
            </div>
            <a href="#" class="view-btn">查看</a>
        </div>

        <footer>
            <p>— 记录每一局成长 —</p>
        </footer>
    </div>
</body>
</html>
